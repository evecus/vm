name: vps_manager
description: VPS Manager - Control your servers from anywhere
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # WebSocket & Terminal
  web_socket_channel: ^2.4.0
  xterm: ^4.0.0

  # Storage
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0

  # File handling
  file_picker: ^6.1.1
  path: ^1.9.0
  path_provider: ^2.1.2

  # Utils
  uuid: ^4.3.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
