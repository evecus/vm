name: Build VM

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string

jobs:
  # ─── Build Go Server ────────────────────────────────────────────
  build-server:
    name: Build Server (Go) (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        working-directory: server
        run: |
          rm -f go.sum
          go mod tidy

      - name: Build
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: 0
        run: |
          mkdir -p ../dist
          go build -ldflags="-s -w" -o ../dist/vm-server-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: dist/vm-server-${{ matrix.suffix }}

  # ─── Build Flutter APK ──────────────────────────────────────────
  build-client:
    name: Build Client (Flutter APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Set version
        working-directory: client
        run: |
          # version name = input, versionCode = integer from input (e.g. 1.0.0 -> 100)
          VERSION="${{ github.event.inputs.version }}"
          # Build versionCode: strip dots and left-pad to integer e.g. 1.2.3 -> 10203
          CODE=$(echo "$VERSION" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          sed -i "s/^version: .*/version: ${VERSION}+${CODE}/" pubspec.yaml
          echo "Set version: ${VERSION}+${CODE}"

      - name: Flutter pub get
        working-directory: client
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Flutter analyze
        working-directory: client
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        working-directory: client
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          mkdir -p dist
          cp client/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   dist/vm-arm64.apk
          cp client/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/vm-armv7.apk
          cp client/build/app/outputs/flutter-apk/app-x86_64-release.apk      dist/vm-x86_64.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-apks
          path: dist/*.apk

  # ─── Create Release ─────────────────────────────────────────────
  release:
    name: Create Release
    needs: [ build-server, build-client ]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List dist
        run: ls -lh dist/

      - name: Prepare extras
        run: |
          cp server/config.yaml.example dist/config.yaml.example || true
          cp server/vps-agent.service   dist/vm-server.service   || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: VM v${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/vm-server-linux-amd64
            dist/vm-server-linux-arm64
            dist/vm-server-linux-armv7
            dist/vm-arm64.apk
            dist/vm-armv7.apk
            dist/vm-x86_64.apk
            dist/config.yaml.example
            dist/vm-server.service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
