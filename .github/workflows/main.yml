name: Build VPS Manager

on:
  workflow_dispatch:

jobs:
  # ─── Build Go Server ──────────────────────────────────────────
  build-server:
    name: Build Server (Go)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: server/go.sum

      - name: Download dependencies
        working-directory: server
        run: go mod tidy

      - name: Build
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o ../dist/vps-agent-${{ matrix.suffix }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: dist/vps-agent-${{ matrix.suffix }}

  # ─── Build Flutter Client ─────────────────────────────────────
  build-client:
    name: Build Client (Flutter APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        working-directory: client
        run: flutter pub get

      - name: Flutter analyze
        working-directory: client
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (release)
        working-directory: client
        run: flutter build apk --release --split-per-abi

      - name: Copy APKs
        run: |
          mkdir -p dist
          cp client/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/vps-manager-arm64.apk
          cp client/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/vps-manager-armv7.apk
          cp client/build/app/outputs/flutter-apk/app-x86_64-release.apk dist/vps-manager-x86_64.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-apks
          path: dist/*.apk

  # ─── Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [ build-server, build-client ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Prepare release assets
        run: |
          # Copy example config and service file
          cp server/config.yaml.example dist/config.yaml.example
          cp server/vps-agent.service dist/vps-agent.service

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: VPS Manager ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/vps-agent-linux-amd64
            dist/vps-agent-linux-arm64
            dist/vps-agent-linux-armv7
            dist/vps-manager-arm64.apk
            dist/vps-manager-armv7.apk
            dist/vps-manager-x86_64.apk
            dist/config.yaml.example
            dist/vps-agent.service
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
